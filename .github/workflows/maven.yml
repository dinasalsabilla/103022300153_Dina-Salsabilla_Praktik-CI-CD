# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release: 
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: 
      contents: write 
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        server-id: github 
        settings-path: ${{ github.workspace }}
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Verify settings.xml 
      run: | 
        ls -al $GITHUB_WORKSPACE 
        test -f $GITHUB_WORKSPACE/settings.xml && echo "settings.xml found"

    - name: Build and analyze with SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=dinasalsabilla -Dsonar.projectKey=dinasalsabilla_103022300153_Dina-Salsabilla_Praktik-CI-CD

    - name: Publish to GitHub Packages Apache Maven
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
